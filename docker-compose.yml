# ── Medical AI Assistant — Docker Compose ──────────────────────────────────────
# Runs the same 4 services as the manual terminal method, but in containers.
# Requires: .env (with GROQ_API_KEY, LANGSMITH_API_KEY) at project root.
#
# Build & start:  docker compose up --build
# Stop:           docker compose down

services:

  # ── 1. MCP Server (port 8001) ───────────────────────────────────────────────
  mcp:
    build: .
    command: python mcp_server/server.py
    ports:
      - "8001:8001"
    env_file:
      - .env
      - .env.docker
    environment:
      MCP_HOST: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8001),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── 2. LangGraph dev server (port 2024) ─────────────────────────────────────
  langgraph:
    build: .
    command: langgraph dev --host 0.0.0.0 --port 2024 --no-browser
    ports:
      - "2024:2024"
    env_file:
      - .env
      - .env.docker
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',2024),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── 3. FastAPI backend (port 8000) ──────────────────────────────────────────
  api:
    build: .
    command: uvicorn backend.app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.docker
    depends_on:
      langgraph:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 4. Streamlit frontend (port 8501) ───────────────────────────────────────
  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
      - .env.docker
    environment:
      API_URL: "http://api:8000"
      FONTS_DIR: "/app/fonts"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
